<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset='utf-8'>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MEMBER PROFILE</title>
    <meta content='Login Member Profiles' name='description'>
    <meta content='login, member, username, password, mikrotik, router, winbox, termimal, rsc, script, routeros' name='keywords'>
    <meta content='index, follow, noodp' name='robots'>
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">
    <meta property="og:title" content="Login Member Profiles">
    <meta property="og:description" content="Login Member Profiles">
    <meta property="og:image" content="https://github-production-user-asset-6210df.s3.amazonaws.com/42666125/264986691-0448a41f-10d0-4352-9810-2fd5afe9c2bb.png">
    <meta property="og:image:alt" content="Login Member Profiles">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://ros-eight.vercel.app/login">
    <link rel="shortcut icon" href="./favicon.ico" type="image/x-icon">  
    <link rel="stylesheet" href="./index.css">
  </head>
  <body>
    <div id="wrap">
      <div id="mymenu" class="mymenu">
        <div class="mikrotik-logo" >
          <img src="../img/made-for-mikrotik.png">
        </div>
        <ul>
          <li><a href="https://ros-eight.vercel.app">HOME</a></li>
        </ul>
      </div>
      <div id="myProfile" class="modal-profile">
        <div id="homepage" style="width: 700px;" class="modal-content-profile">
          <div class="avatar">
            <img alt="avatar" id="myavatar" src="https://user-images.githubusercontent.com/42666125/199234814-c320e1fc-da95-489e-a955-43b82e3f4b46.png" >
          </div>
          <span style="font-weight:bold; font-size:20px; color:#fff"><span id="profile-email" style="color:#292929"></span></span>
          <br><br>
          <span style="font-weight:bold; font-size:13px">E-MAIL AUTH <span style="margin-left:37px;margin-right:6px">:</span><span id="email_Verified"></span></span><br><br>
          <span style="font-weight:bold;font-size:13px">E-MAIL IDENTIFIER <span style="margin-left:4px; margin-right:6px">:</span><span style="color:#ff6600;font-weight:bold;" id="welcome-email"></span></span>
          <span style="display:none; font-weight:bold; font-size:13px">USER UID <span style="margin-left:63px;margin-right:6px">:</span><span style="color:#ff6600;font-weight:bold;" id="user-id"></span></span><br><br>
          <span style="font-weight:bold; font-size:13px">YOUR NAME <span style="margin-left:45px;margin-right:6px">:</span><span style="color:#ff6600;font-weight:bold;" id="your-name"></span></span>
          <br><br>
          <button  id="back-home" onclick="history.back()">⬅ Back</button>
          <button  id="edit-user" onclick="CallModalChangeProfileShow()">Edit Profile</button>
          <button  onclick="CallModalChangePasswordShow()">Set Password</button>
          <button  id="delete-user" onclick="DeleteMember()">Delete Account</button>
          <button  id="signout">Logout</button>
          <div style="margin-top:20px; padding-top:10px;width:100%;color:#292929; border-top:1px solid #bbb;font-weight:normal;font-size:13px">
            © <span id="year">2024</span> RouterOS Tools
          </div>
        </div>
      </div>
    </div>
    <div id="myChangePassword" class="modal-change-password">
      <div style="width: 350px;" class="modal-content">
        <div class="forms-out">
          <div class="forms-in">
            <h2>SET PASSWORD</h2>
            <br><br>
            <label>New Password <span style="color:#ff6600">*</span></label>
            <input type="password" id="new-password" placeholder="New Password">
            <label>Confirm New Password <span style="color:#ff6600">*</span></label>
            <input type="password" id="re-new-password" autocomplete="off" placeholder="Confirm New Password">
            <button style="width:100px !important;margin-bottom:20px" id="change-pass-button">Save</button>
            <button style="width:100px !important;" onclick="CallModalChangePasswordHide()" >Cancel</button>
          </div>
        </div>
      </div>
    </div>
    <div id="myChangeProfile" class="modal-change-profile">
      <div style="width: 350px;" class="modal-content">
        <div class="forms-out">
          <div class="forms-in">
            <h2>EDIT PROFILE</h2>
            <br><br>
            <label>Your Name: <span style="color:#ff6600"></span></label>
            <input id="profile-name" placeholder="your name">
            <label>Your Image URL: <span style="color:#ff6600"></span></label>
            <input id="profile-url" autocomplete="off" placeholder="your image URL">
            <button style="width:100px !important;margin-bottom:20px" onclick="CangeProfile()">Save</button>
            <button style="width:100px !important;" onclick="CallModalChangeProfileHide()" >Cancel</button>
          </div>
        </div>
    <div id="dialogoverlay"></div>
    <div id="dialogbox">
      <div>
        <div id="dialogboxhead"></div>
        <div id="dialogboxbody"></div>
        <div id="dialogboxfoot"></div>
      </div>
    </div>
	<script>
	window.location.replace("https://ros-eight.vercel.app/login/");
	</script>	
    <script src="./index.js"></script>
  </body>
</html>
